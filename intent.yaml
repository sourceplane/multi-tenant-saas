apiVersion: sourceplane.io/v1
kind: Intent
metadata:
  name: multi-tenant-saas
  description: Reusable Cloudflare and Supabase multi-tenant SaaS starter
execution:
  state:
    backendUrl: https://orun-api.sourceplane.ai
compositions:
  sources:
    - name: stack-tectonic
      kind: dir
      path: stack-tectonic/

discovery:
  roots:
    - apps/
    - packages/
    - tests/
    - infra/

environments:
  dev:
    defaults:
      namespacePrefix: dev-


  staging:
    defaults:
      namespacePrefix: stg-


  production:
    defaults:
      namespacePrefix: prod-

