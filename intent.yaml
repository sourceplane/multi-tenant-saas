apiVersion: sourceplane.io/v1
kind: Intent
metadata:
  name: multi-tenant-saas
  description: Reusable Cloudflare and Supabase multi-tenant SaaS starter
execution:
  state:
    backendUrl: https://orun-api.sourceplane.ai
  profiles:
    dry-run:
      controls:
        terraform:
          fmt:
            enabled: true
          init:
            enabled: true
            backend: false
          validate:
            enabled: true
          plan:
            enabled: false
          apply:
            enabled: false

    verify:
      controls:
        terraform:
          fmt:
            enabled: true
          init:
            enabled: true
            backend: true
          validate:
            enabled: true
          plan:
            enabled: true
          apply:
            enabled: false

    release:
      controls:
        terraform:
          fmt:
            enabled: true
          init:
            enabled: true
            backend: true
          validate:
            enabled: true
          plan:
            enabled: true
          apply:
            enabled: false

automation:
  triggers:
    - name: github-pull-request
      on:
        provider: github
        event: pull_request
        actions:
          - opened
          - synchronize
          - reopened
          - ready_for_review
      plan:
        profile: dry-run

    - name: github-push-main
      on:
        provider: github
        event: push
        branches:
          - main
      plan:
        profile: verify

    - name: github-tag-release
      on:
        provider: github
        event: push
        tags:
          - "v*"
      plan:
        profile: release

compositions:
  sources:
    - name: stack-tectonic
      kind: dir
      path: stack-tectonic/
      
discovery:
  roots:
    - apps/
    - packages/
    - tests/
    - infra/


environments:
  dev:
    execution:
      profile: release
    defaults:
      lane: dry-run
      namespacePrefix: dev-
    policies:
      requireApproval: "false"
  staging:
    execution:
      profile: verify
    defaults:
      lane: verify
      namespacePrefix: stg-
    policies:
      requireApproval: "true"
  production:
    execution:
      profile: release
    defaults:
      lane: release
      namespacePrefix: prod-
    policies:
      requireApproval: "true"
