apiVersion: sourceplane.io/v1
kind: Intent
metadata:
  name: multi-tenant-saas
  description: Reusable Cloudflare and Supabase multi-tenant SaaS starter
execution:
  state:
    backendUrl: https://orun-api.sourceplane.ai
  profiles:
    dry-run:
      controls:
        terraform:
          fmt:
            enabled: true
          init:
            enabled: true
            backend: false
          validate:
            enabled: true
          plan:
            enabled: false
          apply:
            enabled: false

    verify:
      controls:
        terraform:
          fmt:
            enabled: true
          init:
            enabled: true
            backend: true
          validate:
            enabled: true
          plan:
            enabled: true
          apply:
            enabled: false

    release:
      controls:
        terraform:
          fmt:
            enabled: true
          init:
            enabled: true
            backend: true
          validate:
            enabled: true
          plan:
            enabled: true
          apply:
            enabled: false

compositions:
  sources:
    - name: stack-tectonic
      kind: dir
      path: stack-tectonic/
      
discovery:
  roots:
    - apps/
    - packages/
    - tests/
    - infra/


environments:
  dev:
    execution:
      profile: dry-run
    defaults:
      lane: dry-run
      namespacePrefix: dev-
    policies:
      requireApproval: "false"
  staging:
    execution:
      profile: verify
    defaults:
      lane: verify
      namespacePrefix: stg-
    policies:
      requireApproval: "true"
  production:
    defaults:
      lane: release
      namespacePrefix: prod-
    policies:
      requireApproval: "true"
