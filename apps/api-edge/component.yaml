apiVersion: sourceplane.io/v1
kind: Component
metadata:
  name: api-edge
spec:
  type: cloudflare-worker-turbo
  domain: starter-runtime
  subscribe:
    environments:
      - name: dev
        profile: pull-request
      - name: staging
        profile: verify
      - name: production
        profile: deploy
  inputs:
    nodeVersion: "22"
    pnpmVersion: "10.12.1"
    productionBranch: main
    buildCommand: pnpm exec turbo run build --filter=./
    typecheckCommand: pnpm exec turbo run typecheck --filter=./
  labels:
    team: platform
    layer: runtime
    surface: api
    runtime: cloudflare
