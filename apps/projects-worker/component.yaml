apiVersion: sourceplane.io/v1
kind: Component
metadata:
  name: projects-worker
  description: Cloudflare Worker for the Projects runtime
spec:
  type: cloudflare-worker-turbo
  domain: starter-runtime
  path: apps/projects-worker
  dependsOn:
    - component: membership-worker
    - component: policy-worker
    - component: billing-worker
  subscribe:
    environments:
      - name: dev
        profile: verify
      - name: stage
        profile: verify
        profileRules:
          - profile: deploy
            when:
              triggerRef: github-push-main
      - name: prod
        profile: verify
        profileRules:
          - profile: deploy
            when:
              triggerRef: github-push-main
  parameters:
    nodeVersion: "22"
    pnpmVersion: "10.12.1"
    workspaceDir: ../..
    appDir: .
    turboFilter: "@saas/projects-worker"
    wranglerConfig: wrangler.jsonc
    installCommand: pnpm install --frozen-lockfile
    buildCommand: pnpm exec turbo run build --filter=@saas/projects-worker
    typecheckCommand: pnpm exec turbo run typecheck --filter=@saas/projects-worker
    dryRunCommand: pnpm exec wrangler deploy --dry-run --config wrangler.jsonc --env prod
    deployCommand: pnpm exec wrangler deploy --config wrangler.jsonc --env prod
    preDeployCommand: "echo 'No pre-deploy step configured.'"
    migrationCommand: "echo 'No migrations configured.'"
    smokeCommand: "echo 'No smoke test configured.'"
  labels:
    team: platform
    layer: runtime
    surface: projects
    runtime: cloudflare
