apiVersion: sourceplane.io/v1
kind: Component
metadata:
  name: web-console
spec:
  type: cloudflare-pages-turbo
  domain: starter-ui
  subscribe:
    environments:
      - name: dev
        profile: pull-request
      - name: stage
        profile: pull-request
      - name: prod
        profile: pull-request
  parameters:
    nodeVersion: "20"
    pnpmVersion: "10.12.1"
    outputDir: dist
    projectName: sourceplane-web-console
    productionBranch: main
    buildCommand: pnpm exec turbo run build --filter=./
  labels:
    team: platform
    layer: delivery
    surface: web-console
    runtime: cloudflare
