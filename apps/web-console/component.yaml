apiVersion: sourceplane.io/v1
kind: Component
metadata:
  name: web-console
  description: Cloudflare Pages App for the Sourceplane web console (per-environment)
spec:
  type: cloudflare-pages-turbo
  domain: starter-ui
  path: apps/web-console
  subscribe:
    environments:
      - name: dev
        profile: verify
      - name: stage
        profile: verify
        profileRules:
          - profile: deploy
            when:
              triggerRef: github-push-main

      - name: prod
        profile: verify
        profileRules:
          - profile: deploy
            when:
              triggerRef: github-push-main
  parameters:
    nodeVersion: "22"
    pnpmVersion: "10.12.1"

    workspaceDir: ../..
    appDir: .

    turboFilter: "@saas/web-console"
    outputDir: dist
    projectName: sourceplane-web-console
    deployBranch: main

    environmentAwareProjectName: true
    environmentBuildVar: VITE_DEPLOY_ENV

    installCommand: pnpm install --frozen-lockfile
    buildCommand: pnpm exec turbo run build --filter=@saas/web-console

    smokeCommand: "curl -sf https://${EFFECTIVE_PROJECT_NAME}.pages.dev/ | grep -q 'Sourceplane Console' && curl -sf https://api-edge-${ORUN_ENVIRONMENT}.rahulvarghesepullely.workers.dev/health | grep -q ok"
  labels:
    team: platform
    layer: delivery
    surface: web-console
    runtime: cloudflare
