apiVersion: sourceplane.io/v1
kind: Component
metadata:
  name: web-console
  description: Cloudflare Pages app for the Sourceplane web console
spec:
  type: cloudflare-pages-turbo
  domain: starter-ui
  path: apps/web-console
  subscribe:
    environments:
      - name: dev
        profile: pull-request
      - name: stage
        profile: verify
      - name: prod
        profile: deploy
  parameters:
    nodeVersion: "20"
    pnpmVersion: "10.12.1"

    workspaceDir: ../..
    appDir: .

    turboFilter: "@sourceplane/web-console"
    outputDir: dist
    projectName: sourceplane-web-console
    deployBranch: main

    installCommand: pnpm install --frozen-lockfile
    buildCommand: pnpm exec turbo run build --filter=@sourceplane/web-console

    smokeCommand: "echo 'No smoke test configured.'"
  labels:
    team: platform
    layer: delivery
    surface: web-console
    runtime: cloudflare
