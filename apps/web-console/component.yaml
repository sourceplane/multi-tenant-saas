apiVersion: sourceplane.io/v1
kind: Component
metadata:
  name: web-console
spec:
  type: cloudflare-pages-turbo
  domain: starter-ui
  inputs:
    nodeVersion: "20"
    pnpmVersion: "10.12.1"
    buildCommand: pnpm exec turbo run build --filter=./
    typecheckCommand: pnpm exec turbo run typecheck --filter=./
    lintCommand: pnpm exec turbo run lint --filter=./
    outputDirectory: dist
