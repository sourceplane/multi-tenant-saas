apiVersion: sourceplane.io/v1
kind: Component
metadata:
  name: web-console
  description: Cloudflare Pages App for the Sourceplane web console
spec:
  type: cloudflare-pages-turbo
  domain: starter-ui
  path: apps/web-console
  subscribe:
    environments:
      - name: dev
        profile: verify
      - name: stage
        profile: verify
        profileRules:
          - profile: deploy
            when:
              triggerRef: github-push-main

      - name: prod
        profile: verify
        profileRules:
          - profile: deploy
            when:
              triggerRef: github-push-main
  parameters:
    nodeVersion: "22"
    pnpmVersion: "10.12.1"

    workspaceDir: ../..
    appDir: .

    turboFilter: "@saas/web-console"
    outputDir: dist
    projectName: sourceplane-web-console
    deployBranch: main

    installCommand: pnpm install --frozen-lockfile
    buildCommand: pnpm exec turbo run build --filter=@saas/web-console

    smokeCommand: "echo 'No smoke test configured.'"
  labels:
    team: platform
    layer: delivery
    surface: web-console
    runtime: cloudflare
