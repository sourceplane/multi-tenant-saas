apiVersion: sourceplane.io/v1
kind: Component
metadata:
  name: web-console-next
  description: Next.js 15 + opennextjs/cloudflare delivery of the Sourceplane web console (per-environment, Workers + Static Assets)
spec:
  type: cloudflare-workers-assets-turbo
  domain: starter-ui
  path: apps/web-console-next
  subscribe:
    environments:
      - name: dev
        profile: verify
      - name: stage
        profile: verify
        profileRules:
          - profile: deploy
            when:
              triggerRef: github-push-main
      - name: prod
        profile: verify
        profileRules:
          - profile: deploy
            when:
              triggerRef: github-push-main
  parameters:
    nodeVersion: "22"
    pnpmVersion: "10.12.1"

    workspaceDir: ../..
    appDir: .

    turboFilter: "@saas/web-console-next"
    wranglerConfig: wrangler.jsonc

    # @opennextjs/cloudflare emits a Worker entrypoint plus a static-assets
    # directory bound via ASSETS — both are deployed in one `wrangler deploy`.
    workerEntrypoint: .open-next/worker.js
    assetsDir: .open-next/assets

    # Worker is named per-env (sourceplane-web-console-next-{dev,stage,prod}),
    # matching the prior Pages-project naming convention so the cutover in
    # Task 0083 only needs to repoint the custom domain.
    workerName: sourceplane-web-console-next
    environmentAwareWorkerName: true

    # The account's workers.dev subdomain; exposed to the smoke step as
    # ${WORKERS_DEV_SUBDOMAIN} and used to build ${DEPLOYED_URL}.
    workersDevSubdomain: rahulvarghesepullely

    environmentBuildVar: NEXT_PUBLIC_DEPLOY_ENV

    installCommand: pnpm install --frozen-lockfile
    buildCommand: pnpm exec turbo run build --filter=@saas/web-console-next

    # Smoke: follow redirects (root `redirect("/orgs")` is a 307) and confirm
    # the SSR'd page contains the console marker. The api-edge worker is the
    # same hostname pattern as before.
    smokeCommand: "curl -sfL ${DEPLOYED_URL}/ | grep -q 'Sourceplane Console' && curl -sf https://api-edge-${ORUN_ENVIRONMENT}.rahulvarghesepullely.workers.dev/health | grep -q ok"
  labels:
    team: platform
    layer: delivery
    surface: web-console-next
    runtime: cloudflare
