apiVersion: sourceplane.io/v1
kind: Component

metadata:
  name: cloudflare-hyperdrive
  description: Provisions Cloudflare Hyperdrive resources for stage and prod Supabase Postgres databases
  labels:
    domain: infra
    scope: runtime-database-gateway

spec:
  type: terraform
  domain: infra

  parameters:
    orgName: sourceplane
    stackName: cloudflare-hyperdrive
    terraformDir: terraform
    terraformVersion: "1.15.3"
    cloudflare_api_token: "${CLOUDFLARE_API_TOKEN:-}"
    cloudflare_account_id: "${CLOUDFLARE_ACCOUNT_ID:-}"

  env:
    AWS_EC2_METADATA_DISABLED: "true"

  dependsOn:
    - component: supabase

  subscribe:
    environments:
      - name: stage
        profile: plan-only
        profileRules:
          - profile: apply
            when:
              triggerRef: github-push-main

      - name: prod
        profile: plan-only
        profileRules:
          - profile: apply
            when:
              triggerRef: github-push-main
