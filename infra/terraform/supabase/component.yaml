apiVersion: sourceplane.io/v1
kind: Component

metadata:
  name: supabase
  description: Provisions Supabase projects for stage and prod and stores credentials in AWS Secrets Manager
  labels:
    domain: infra
    scope: database

spec:
  type: terraform
  lifecycle: production
  owner: platform
  domain: infra

  parameters:
    orgName: sourceplane
    stackName: supabase
    terraformDir: terraform
    terraformVersion: "1.15.3"

  env:
    AWS_EC2_METADATA_DISABLED: "true"

  subscribe:
    environments:
      - name: stage
        profile: plan-only
        profileRules:
          - profile: apply
            when:
              triggerRef: github-push-main

      - name: prod
        profile: plan-only
        profileRules:
          - profile: apply
            when:
              triggerRef: github-push-main
