apiVersion: sourceplane.io/v1
kind: Component
metadata:
  name: infra-terraform-core
spec:
  type: turbo-package
  domain: starter-infra
  inputs:
    nodeVersion: "20"
    pnpmVersion: "10.12.1"
  labels:
    layer: infra
    provider: terraform
  dependsOn:
    - component: infra-terraform-state
      condition: success
