apiVersion: sourceplane.io/v1
kind: Component
metadata:
  name: infra-terraform-core
spec:
  type: terraform
  domain: starter-infra
  subscribe:
    environments:
      - dev
  inputs:
    stackName: core
    terraformDir: .
  labels:
    layer: infra
    provider: terraform
  dependsOn:
    - component: infra-terraform-state
      condition: success
