apiVersion: sourceplane.io/v1
kind: Component

metadata:
  name: tf-state-r2
  description: Cloudflare R2 state bucket (legacy — migrating to AWS S3 in Task 0005)
  labels:
    domain: infra
    security-boundary: repo
    migration-target: s3

spec:
  type: terraform
  domain: infra

  parameters:
    orgName: sourceplane
    stackName: tf-state-r2
    terraformDir: .
    terraformVersion: "1.15.3"

  env:
    AWS_EC2_METADATA_DISABLED: "true"

  subscribe:
    environments:
      - name: dev
        profile: plan-only
        profileRules:
          - profile: apply
            when:
              triggerRef: github-push-main
      - name: stage
        profile: plan-only
        profileRules:
          - profile: apply
            when:
              triggerRef: github-push-main
      - name: prod
        profile: plan-only
        profileRules:
          - profile: apply
            when:
              triggerRef: github-push-main
