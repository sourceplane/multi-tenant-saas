apiVersion: sourceplane.io/v1
kind: Component
metadata:
  name: infra-terraform-state
spec:
  type: terraform
  domain: starter-infra
  subscribe:
    environments:
      - name: dev
        profile: pull-request
      - name: staging
        profile: verify
      - name: production
        profile: release
  inputs:
    stackName: state
    terraformDir: .
  labels:
    layer: infra
    provider: terraform
