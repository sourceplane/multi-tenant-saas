apiVersion: sourceplane.io/v1
kind: Component
metadata:
  name: contracts
spec:
  type: turbo-package
  domain: starter-contracts
  subscribe:
    environments:
      - dev
  inputs:
    nodeVersion: "20"
    pnpmVersion: "10.12.1"
    buildCommand: pnpm exec turbo run build --filter=./
    typecheckCommand: pnpm exec turbo run typecheck --filter=./
