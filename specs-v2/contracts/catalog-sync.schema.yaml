$schema: "https://json-schema.org/draft/2020-12/schema"
title: OrunCatalogSyncEnvelope
type: object
additionalProperties: false
required:
  - apiVersion
  - kind
  - uploadId
  - schemaVersion
  - source
  - plan
  - components
  - signature
  - generatedAt
properties:
  apiVersion:
    type: string
    const: orun.io/v2
  kind:
    type: string
    const: CatalogSyncEnvelope
  uploadId:
    type: string
    description: Stable idempotency and replay key generated by the exporting CLI.
  schemaVersion:
    type: string
    description: Date or semantic version of the exported catalog payload schema.
  tenant:
    type:
      - object
      - "null"
    additionalProperties: false
    properties:
      orgId:
        type: string
        description: Advisory organization hint. The server must verify the organization from repository installation claims before trusting it.
  source:
    type: object
    additionalProperties: false
    required:
      - provider
      - repository
      - repoId
      - commit
    properties:
      provider:
        type: string
        enum:
          - github
      repository:
        type: string
        description: Provider full name, for example sourceplane/example-platform-repo.
      repoId:
        type: string
        description: Provider-stable repository id.
      branch:
        type:
          - string
          - "null"
      ref:
        type:
          - string
          - "null"
      commit:
        type: string
      workflowRunId:
        type:
          - string
          - "null"
      workflowRef:
        type:
          - string
          - "null"
      pullRequest:
        type:
          - object
          - "null"
        additionalProperties: false
        properties:
          number:
            type: integer
          title:
            type:
              - string
              - "null"
          author:
            type:
              - string
              - "null"
  plan:
    type: object
    additionalProperties: false
    required:
      - id
      - checksum
    properties:
      id:
        type: string
      checksum:
        type: string
      status:
        type:
          - string
          - "null"
      objectRef:
        type:
          - string
          - "null"
        description: Optional client-provided artifact ref. The server may replace this with its own R2 ref.
      generatedAt:
        type:
          - string
          - "null"
        format: date-time
      affectedJobs:
        type: array
        items:
          type: string
  components:
    type: array
    minItems: 1
    items:
      $ref: "#/$defs/componentState"
  runs:
    type: array
    items:
      $ref: "#/$defs/pipelineRun"
  deployments:
    type: array
    items:
      $ref: "#/$defs/deployment"
  artifacts:
    type: array
    items:
      $ref: "#/$defs/artifactRef"
  signature:
    type: object
    additionalProperties: false
    required:
      - type
    properties:
      type:
        type: string
        enum:
          - github-oidc
          - capability-token
      jwtAudience:
        type:
          - string
          - "null"
      issuer:
        type:
          - string
          - "null"
      subject:
        type:
          - string
          - "null"
      keyId:
        type:
          - string
          - "null"
      verified:
        type:
          - boolean
          - "null"
        description: Exporter-provided value is advisory. Server verification result is authoritative.
  generatedAt:
    type: string
    format: date-time
$defs:
  componentState:
    type: object
    additionalProperties: false
    required:
      - id
      - name
      - type
      - path
    properties:
      id:
        type: string
        description: Stable catalog component id, preferably provider repo id plus component name.
      name:
        type: string
      title:
        type:
          - string
          - "null"
      description:
        type:
          - string
          - "null"
      type:
        type: string
      owner:
        type:
          - string
          - "null"
      system:
        type:
          - string
          - "null"
      lifecycle:
        type:
          - string
          - "null"
      path:
        type: string
      tags:
        type: array
        items:
          type: string
      environments:
        type: array
        items:
          $ref: "#/$defs/componentEnvironment"
      relations:
        type: array
        items:
          $ref: "#/$defs/componentRelation"
      plan:
        type:
          - object
          - "null"
        additionalProperties: false
        properties:
          changed:
            type:
              - boolean
              - "null"
          affectedJobs:
            type: array
            items:
              type: string
      pr:
        type:
          - object
          - "null"
        additionalProperties: false
        properties:
          number:
            type: integer
          changedFiles:
            type: array
            items:
              type: string
          riskScore:
            type:
              - string
              - "null"
  componentEnvironment:
    type: object
    additionalProperties: false
    required:
      - name
      - status
    properties:
      name:
        type: string
      status:
        type: string
        enum:
          - healthy
          - degraded
          - failing
          - stale
          - unknown
      latestRunId:
        type:
          - string
          - "null"
      latestJobId:
        type:
          - string
          - "null"
      latestDeploymentId:
        type:
          - string
          - "null"
      updatedAt:
        type:
          - string
          - "null"
        format: date-time
  componentRelation:
    type: object
    additionalProperties: false
    required:
      - relationType
      - targetKind
      - targetRef
    properties:
      relationType:
        type: string
        enum:
          - depends_on
          - provides_api
          - consumes_api
          - uses_resource
          - deploys_with
          - runs_before
          - runs_after
      targetKind:
        type: string
      targetRef:
        type: string
      environment:
        type:
          - string
          - "null"
  pipelineRun:
    type: object
    additionalProperties: false
    required:
      - id
      - status
    properties:
      id:
        type: string
      planId:
        type:
          - string
          - "null"
      environment:
        type:
          - string
          - "null"
      status:
        type: string
        enum:
          - queued
          - running
          - success
          - failed
          - canceled
          - unknown
      startedAt:
        type:
          - string
          - "null"
        format: date-time
      completedAt:
        type:
          - string
          - "null"
        format: date-time
      jobs:
        type: array
        items:
          $ref: "#/$defs/runJob"
  runJob:
    type: object
    additionalProperties: false
    required:
      - id
      - name
      - status
    properties:
      id:
        type: string
      name:
        type: string
      componentId:
        type:
          - string
          - "null"
      environment:
        type:
          - string
          - "null"
      status:
        type: string
      durationMs:
        type:
          - integer
          - "null"
      logRef:
        type:
          - string
          - "null"
  deployment:
    type: object
    additionalProperties: false
    required:
      - id
      - componentId
      - environment
      - status
    properties:
      id:
        type: string
      componentId:
        type: string
      version:
        type:
          - string
          - "null"
      environment:
        type: string
      status:
        type: string
      runId:
        type:
          - string
          - "null"
      jobId:
        type:
          - string
          - "null"
      commit:
        type:
          - string
          - "null"
      startedAt:
        type:
          - string
          - "null"
        format: date-time
      completedAt:
        type:
          - string
          - "null"
        format: date-time
  artifactRef:
    type: object
    additionalProperties: false
    required:
      - kind
      - path
    properties:
      kind:
        type: string
      path:
        type: string
      contentType:
        type:
          - string
          - "null"
      sha256:
        type:
          - string
          - "null"
example:
  apiVersion: orun.io/v2
  kind: CatalogSyncEnvelope
  uploadId: upl_01hx
  schemaVersion: "2026-05-01"
  tenant:
    orgId: org_123
  source:
    provider: github
    repository: sourceplane/example-platform-repo
    repoId: "123456"
    branch: main
    ref: refs/heads/main
    commit: abc123
    workflowRunId: "987654"
    workflowRef: sourceplane/example-platform-repo/.github/workflows/orun-plan.yaml@refs/heads/main
    pullRequest: null
  plan:
    id: plan_abc
    checksum: sha256:abc
    status: success
    objectRef: null
    generatedAt: "2026-05-07T10:00:00Z"
    affectedJobs:
      - api-edge-worker@production.deploy
  components:
    - id: github:123456:api-edge-worker
      name: api-edge-worker
      title: API Edge Worker
      description: Cloudflare Worker that serves the public API edge.
      type: cloudflare-worker
      owner: team-platform
      system: saas-platform
      lifecycle: production
      path: apps/api-edge-worker/component.yaml
      tags:
        - cloudflare
        - edge
        - api
      environments:
        - name: production
          status: healthy
          latestRunId: run_abc
          latestJobId: api-edge-worker@production.deploy
          latestDeploymentId: deploy_001
          updatedAt: "2026-05-07T10:00:00Z"
      relations:
        - relationType: depends_on
          targetKind: component
          targetRef: auth-worker
          environment: null
      plan:
        changed: true
        affectedJobs:
          - api-edge-worker@production.deploy
      pr: null
  runs: []
  deployments: []
  artifacts: []
  signature:
    type: github-oidc
    jwtAudience: orun-cloud
    issuer: https://token.actions.githubusercontent.com
    subject: repo:sourceplane/example-platform-repo:ref:refs/heads/main
    keyId: null
    verified: null
  generatedAt: "2026-05-07T10:00:00Z"
