apiVersion: sourceplane.io/v1
kind: Component

metadata:
  name: stack-tectonic

spec:
  type: publish-stack
  domain: platform-stack
  subscribe:
    environments:
      - name: dev
        profile: dry-run
      - name: staging
        profile: verify
      - name: production
        profile: release
  inputs:
    registry: ghcr.io/sourceplane/stack-tectonic
    root: .
    version: "1.0.0"
  labels:
    layer: platform
    provider: orun
