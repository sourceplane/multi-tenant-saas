apiVersion: sourceplane.io/v1alpha1
kind: ComponentSchema
metadata:
  name: cloudflare-worker-turbo-component
spec:
  type: cloudflare-worker-turbo
  schema:
    $schema: http://json-schema.org/draft-07/schema#
    title: Cloudflare Worker Turbo Component
    type: object
    required:
      - name
      - type
      - parameters
    properties:
      name:
        type: string
      type:
        type: string
        const: cloudflare-worker-turbo
      parameters:
        type: object
        required:
          - nodeVersion
          - pnpmVersion
          - workspaceDir
          - appDir
          - turboFilter
          - wranglerConfig
        properties:
          nodeVersion:
            type: string
          pnpmVersion:
            type: string

          workspaceDir:
            type: string
            description: Path from the component job path to the monorepo root

          appDir:
            type: string
            description: Path from the component job path to the Worker app directory

          turboFilter:
            type: string
            description: Turborepo filter for this Worker package

          wranglerConfig:
            type: string
            default: wrangler.jsonc

          installCommand:
            type: string
            default: pnpm install --frozen-lockfile

          buildCommand:
            type: string
          typecheckCommand:
            type: string
          dryRunCommand:
            type: string
          preDeployCommand:
            type: string
            default: "echo 'No pre-deploy step configured.'"
          migrationCommand:
            type: string
            default: "echo 'No migrations configured.'"
          deployCommand:
            type: string
          smokeCommand:
            type: string
            default: "echo 'No smoke test configured.'"
        additionalProperties: false
    additionalProperties: true
