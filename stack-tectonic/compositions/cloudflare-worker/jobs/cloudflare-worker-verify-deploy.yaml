apiVersion: sourceplane.io/v1alpha1
kind: JobTemplate
metadata:
  name: cloudflare-worker-verify-deploy
spec:
  description: Verify a Cloudflare Worker app and deploy it from the production branch
  runsOn: ubuntu-22.04
  timeout: 30m
  retries: 0

  labels:
    scope: delivery

  capabilities:
    - cloudflare-worker.setup
    - cloudflare-worker.install
    - cloudflare-worker.verify-structure
    - cloudflare-worker.build
    - cloudflare-worker.typecheck
    - cloudflare-worker.deploy

  steps:
    - id: setup-node
      name: setup-node
      capability: cloudflare-worker.setup
      use: actions/setup-node@v4
      with:
        node-version: "{{.nodeVersion}}"

    - id: install-dependencies
      name: install-dependencies
      capability: cloudflare-worker.install
      shell: bash
      run: |
        {{if .pnpmVersion}}
        npm install -g pnpm@{{.pnpmVersion}}
        {{end}}
        {{.installCommand}}
      onFailure: stop

    - id: verify-worker-structure
      name: verify-worker-structure
      capability: cloudflare-worker.verify-structure
      shell: bash
      run: |
        test -f package.json
        {{if .wranglerConfig}}
        test -f "{{.wranglerConfig}}"
        {{else}}
        test -f wrangler.jsonc || test -f wrangler.toml
        {{end}}
      onFailure: stop

    - id: build-worker
      name: build-worker
      capability: cloudflare-worker.build
      run: "{{.buildCommand}}"
      onFailure: stop

    - id: typecheck-worker
      name: typecheck-worker
      capability: cloudflare-worker.typecheck
      shell: bash
      run: |
        {{if .typecheckCommand}}
        {{.typecheckCommand}}
        {{else}}
        echo "Skipping typecheck (not configured)."
        {{end}}
      onFailure: stop

    - id: deploy-worker
      name: deploy-worker
      capability: cloudflare-worker.deploy
      shell: bash
      run: |
        if [ "{{.Environment}}" = "dev" ]; then
          echo "::notice::DRY-RUN: Running wrangler deploy --dry-run for {{.Component}} in dev environment."
          pnpm exec wrangler deploy --dry-run
          exit 0
        fi

        if [ "{{.Environment}}" != "production" ] || [ "${GITHUB_REF:-}" != "refs/heads/{{.productionBranch}}" ]; then
          echo "::notice::SKIPPED: Cloudflare Worker deploy for {{.Component}} in {{.Environment}} on ${GITHUB_REF:-local} (not production branch)."
          exit 0
        fi

        : "${CLOUDFLARE_ACCOUNT_ID:?CLOUDFLARE_ACCOUNT_ID is required for deploy}"
        : "${CLOUDFLARE_API_TOKEN:?CLOUDFLARE_API_TOKEN is required for deploy}"

        {{if .preDeployCommand}}
        echo "::group::Pre-deploy"
        {{.preDeployCommand}}
        echo "::endgroup::"
        {{end}}

        {{if .migrationCommand}}
        echo "::group::Run migrations"
        {{.migrationCommand}}
        echo "::endgroup::"
        {{end}}

        echo "::notice::LIVE DEPLOY: Deploying {{.Component}} to Cloudflare from ${GITHUB_REF:-}."
        {{.deployCommand}}

        {{if .smokeCommand}}
        echo "::group::Post-deploy smoke test"
        {{.smokeCommand}}
        echo "::endgroup::"
        {{end}}

        echo "::notice::DEPLOY SUCCESS: {{.Component}} deployed to Cloudflare."
      onFailure: stop
